<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vorcaros Negócios Ltda — Rede Empresarial</title>
        <link rel="icon" href="favicon.svg" type="image/svg+xml" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Monda:wght@400;700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="dist/bundle.css" />
    </head>
    <body>
        <div class="container">
            <button class="panel-toggle" id="toggle-controls">☰</button>
            <div class="left-panel" id="left-panel">
                <div class="top-controls">
                    <h1>Vorcaros Negócios Ltda</h1>
                    <h3>Redes empresariais & societárias</h3>

                    <div class="search-wrapper">
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="Buscar empresas e sócios..."
                        />
                        <span class="search-count" id="searchCount"></span>
                    </div>

                    <div class="toggle-container">
                        <label class="toggle-label">
                            <input type="checkbox" id="showLabelsToggle" checked />
                            <span class="toggle-text">Mostrar nomes</span>
                        </label>
                    </div>

                    <div class="legend">
                        <div class="legend-item">
                            <div class="legend-item-left">
                                <div class="legend-color legend-red"></div>
                                <span>Henrique &amp; Daniel Vorcaro</span>
                            </div>
                            <span class="legend-count" id="count-henrique">—</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-item-left">
                                <div class="legend-color legend-blue"></div>
                                <span>Empresas diretas</span>
                            </div>
                            <span class="legend-count" id="count-blue">—</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-item-left">
                                <div class="legend-color legend-purple"></div>
                                <span>Sócios das empresas</span>
                            </div>
                            <span class="legend-count" id="count-purple">—</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-item-left">
                                <div class="legend-color legend-orange"></div>
                                <span>Empresas dos sócios</span>
                            </div>
                            <span class="legend-count" id="count-orange">—</span>
                        </div>
                        <div class="legend-total" id="legend-total">Carregando...</div>
                    </div>
                </div>

                <div class="status-panel">
                    <div class="status-panel-header">Situação</div>
                    <div class="status-toggles" id="status-toggles"></div>
                </div>

                <div class="cnae-panel">
                    <div class="cnae-panel-header">Atividades econômicas</div>
                    <div class="cnae-list" id="cnae-list"></div>
                </div>
            </div>

            <div class="loading" id="loading">Carregando rede...</div>

            <div class="node-info" id="nodeInfo">
                <div class="node-info-header">
                    <h3 id="nodeInfoTitle">Detalhes</h3>
                    <button id="closeNodeInfo">×</button>
                </div>
                <div id="nodeInfoContent">
                    Clique em um nó para ver suas informações e conexões.
                </div>
            </div>

            <canvas id="network-canvas"></canvas>
        </div>

        <script src="dist/bundle.js"></script>
    </body>
</html>
