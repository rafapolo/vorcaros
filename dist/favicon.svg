<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#030f25"/>
  <!-- edges -->
  <line x1="16" y1="16" x2="6"  y2="8"  stroke="#4488ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="16" y1="16" x2="26" y2="8"  stroke="#4488ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="16" y1="16" x2="6"  y2="26" stroke="#4488ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="16" y1="16" x2="26" y2="26" stroke="#4488ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="6"  y1="8"  x2="26" y2="8"  stroke="#666"    stroke-width="1"   opacity="0.5"/>
  <line x1="6"  y1="26" x2="26" y2="26" stroke="#666"    stroke-width="1"   opacity="0.5"/>
  <!-- outer nodes -->
  <circle cx="6"  cy="8"  r="3" fill="#4488ff"/>
  <circle cx="26" cy="8"  r="3" fill="#4488ff"/>
  <circle cx="6"  cy="26" r="3" fill="#ffa500"/>
  <circle cx="26" cy="26" r="3" fill="#ffa500"/>
  <!-- center node -->
